server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: ecomera-config-server

  main:
    allow-bean-definition-overriding: true # Vault may have overlapping beans

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/ecomera-ecosystem/ecomera-config-server}
          default-label: master
          clone-on-start: true
        native:
          search-locations: classpath:/config
    vault:
      authentication: token
      uri: http://${VAULT_HOST:localhost}:${VAULT_PORT:8200}
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret/ecomera
        profile-separator: "/"
        default-context: shared

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics