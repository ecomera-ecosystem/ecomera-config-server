server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: ecomera-config-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/ecomera-ecosystem/ecomera-config-server}
          default-label: master
          clone-on-start: true
        # Native profile for local development
        native:
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics