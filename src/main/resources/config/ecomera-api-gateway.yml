server:
  port: ${GATEWAY_SERVER_PORT:8080}

spring:
  application:
    name: ecomera-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: ecomera-auth-service
              uri: lb://ecomera-auth-service
              predicates:
                - Path=/api/v1/auth/**, /api/v1/admin/**, /api/v1/management/**
            - id: ecomera-product-service
              uri: lb://ecomera-product-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/categories/**
            - id: ecomera-cart-service
              uri: lb://ecomera-cart-service
              predicates:
                - Path=/api/v1/cart/**
            - id: ecomera-order-service
              uri: lb://ecomera-order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: ecomera-payment-service
              uri: lb://ecomera-payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: ecomera-notification-service
              uri: lb://ecomera-notification-service
              predicates:
                - Path=/api/v1/notifications/**

    vault:
      authentication: token
      uri: http://${VAULT_HOST:localhost}:${VAULT_PORT:8200}
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret/ecomera
        profile-separator: "/"
        default-context: api-gateway

    config:
      uri: http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6

    loadbalancer:
      cache:
        enabled: true
        ttl: 35s

  cache:
    type: caffeine

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    hostname: ${EUREKA_HOSTNAME:localhost}

jwt:
  signing-key: ${JWT_SIGNING_KEY:SuperSecretJWTKeyThatShouldBeRotatedRegularly1234567890}

management:
  endpoints:
    web:
      exposure:
        include: "*"
    gateway:
      enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}