server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ecomera-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: ecomera-auth-service
              uri: lb://ecomera-auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: ecomera-product-service
              uri: lb://ecomera-product-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/categories/**
          filters: []

    loadbalancer:
      cache:
        enabled: true
        ttl: 35s

  cache:
    type: caffeine

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    hostname: ${EUREKA_HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: "*"
    gateway:
      enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}