server:
  port: ${AUTH_SERVER_PORT:8081}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecomera_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: ${LIQUIBASE_ENABLED:true}

  cloud:
    vault:
      uri: http://${VAULT_HOST:localhost}:${VAULT_PORT:8200}
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret/ecomera
        profile-separator: "/"
        default-context: auth-service

    config:
      uri: http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6

jwt:
  signing-key: ${JWT_SIGNING_KEY:SuperSecretJWTKeyThatShouldBeRotatedRegularly1234567890}
  access-token-ttl: ${JWT_ACCESS_TTL:3600000}
  refresh-token-ttl: ${JWT_REFRESH_TTL:604800000}

cors:
  allowed-origins:
    - http://localhost:4200
    - http://localhost:3000
    - http://localhost:5173
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
  allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics