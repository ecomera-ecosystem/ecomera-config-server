server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ecomera_auth
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

jwt:
  secret: ${JWT_SECRET_KEY:ZHVtbXktYm9vdHN0cmFwLXNlY3JldC1rZXktZm9yLXRlc3RpbmctbWluaW11bS0yNTYtYml0cw==}
  expiration: ${JWT_EXPIRATION_TIME:3600000} # 1 hour (in ms)
  refresh-expiration: ${REFRESH_EXPIRATION_TIME:604800000}  # 7 days (in ms)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics